name: retrain

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: retrain, gate-promote, export, check drift
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
          DATA_SOURCE: swissgrid
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python -m scripts.retrain_pipeline

      - name: commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/artifacts/
          git diff --cached --quiet || git commit -m "chore: promote retrained model(s) $(date -u +%F)"
          git push
