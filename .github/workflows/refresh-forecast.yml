name: refresh forecast

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # serving needs no sklearn/mapie: exported boosters + fixed conformal radii
      - run: pip install lightgbm pandas numpy httpx holidays python-dotenv requests xmltodict

      - name: generate forecast.json
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        run: python -m scripts.static_forecast

      - name: deploy to vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_3Ag8A0Yf6Tq5BzjHezklkcT8
          VERCEL_PROJECT_ID: prj_PObHCDF37ZM1jhJyAJb5t6yicwsf
        run: |
          npm install -g vercel
          cd frontend && vercel deploy --prod --yes --token "$VERCEL_TOKEN"
